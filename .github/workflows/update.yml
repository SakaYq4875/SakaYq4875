name: Update AtCoder Stats

on:
  push:
    paths-ignore:
      - 'README.md'
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python update.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull
          git add README.md
          git commit -m "Update AtCoder stats" || exit 0
          git push